# OCR engines: Google Cloud Vision only (no Tesseract / EasyOCR for text blocks).
# Requires: GOOGLE_APPLICATION_CREDENTIALS, Vision API enabled, google-cloud-vision installed.
# Note: image-based table cell OCR in the pipeline still uses Tesseract if tables are detected;
#       install Tesseract or expect table paths to fail partially. Block text uses Vision only.

ocr:
  engines: ["google_vision"]
  confidence_threshold: 0.85
  consensus_boost: false
  consensus_min_similarity: 0.78
  consensus_boost_delta: 0.08
  bangla_easyocr_weight_bonus: 0.0
  engine_weights:
    google_vision: 1.0

languages:
  tesseract: ["ben", "eng"]
  easyocr: ["bn", "en"]

google_vision:
  enabled: true

tesseract:
  psm: 6
  oem: 1
  config_extra: ""
  timeout_seconds: 60

easyocr:
  gpu: false
  readtext:
    mag_ratio: 1.55
    batch_size: 8

preprocess:
  profile: default

semantic:
  extract_question_bank: true

segmentation:
  mode: "blocks"
  min_block_area_px: 8000
